<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>My first three.js app</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }

      .menu {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 220px;
        background: rgba(20, 20, 25, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 16px;
        color: #eee;
        font-size: 13px;
        user-select: none;
      }

      .menu h3 {
        margin: 0 0 12px;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }

      .field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        gap: 8px;
      }

      .field label {
        color: #aaa;
        flex-shrink: 0;
      }

      .field input[type="number"] {
        width: 70px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        color: #eee;
        padding: 4px 8px;
        font: inherit;
        text-align: right;
      }

      .field input[type="number"]:focus {
        outline: none;
        border-color: #6a9fff;
      }

      .field input[type="color"] {
        width: 32px;
        height: 24px;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 6px;
        background: none;
        cursor: pointer;
      }

      .menu button {
        width: 100%;
        margin-top: 4px;
        padding: 8px;
        border: none;
        border-radius: 8px;
        background: #3d6ef7;
        color: white;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .menu button:hover {
        background: #5581f9;
      }

      .menu button:active {
        transform: scale(0.98);
      }

      .menu .stats {
        margin-top: 10px;
        color: #888;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="menu">
      <h3>Спавн куба</h3>
      <div class="field">
        <label for="height">Высота, м</label>
        <input
          id="height"
          type="number"
          value="25"
          min="1"
          max="200"
          step="1"
        />
      </div>
      <div class="field">
        <label for="size">Размер, м</label>
        <input
          id="size"
          type="number"
          value="1"
          min="0.1"
          max="10"
          step="0.1"
        />
      </div>
      <div class="field">
        <label for="mass">Масса, кг</label>
        <input
          id="mass"
          type="number"
          value="1"
          min="0.1"
          max="10"
          step="0.1"
        />
      </div>
      <div class="field">
        <label for="color">Цвет</label>
        <input id="color" type="color" value="#ff3b3b" />
      </div>
      <button id="spawn">Уронить куб</button>
      <div class="stats" id="stats">Кубов: 0</div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
